site_name: ambiscape
site_description: Long-duration first-order ambisonic soundscape analysis
site_url: https://fourms.github.io/ambiscape/
repo_url: https://github.com/fourMs/ambiscape
repo_name: fourMs/ambiscape

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Core:
      - Sessions & conventions: guide/sessions.md
      - Features & descriptors: guide/descriptors.md
      - Mono, stereo & binaural inputs: guide/stereo-mono.md
      - Machine states & fingerprints: guide/states.md
      - State-resolved descriptors: guide/resolve.md
  - Space & acoustics:
      - Spatial analysis: guide/spatial.md
      - Room acoustics & ISO: guide/acoustics.md
  - Time & rhythm:
      - Strike-level rhythm: guide/rhythm.md
      - Modulation profile: guide/modulation.md
      - Civic-grid schedule matching: guide/schedule.md
  - Pitch, timbre & music:
      - Tonality: guide/tonality.md
      - Event timbre: guide/timbre.md
      - Music (tempo & chroma): guide/music.md
      - Carillon bell inventory: guide/carillon.md
  - Ecology & sources:
      - Ratings & global indices: guide/indices.md
      - Biophony (nature & animals): guide/biophony.md
      - Mechanical & transport: guide/mechanical.md
      - Anthropophony (human): guide/anthropophony.md
      - Geophony (wind, rain, water): guide/geophony.md
      - Mains hum & ENF: guide/enf.md
      - Machine listening: guide/ml.md
  - Interpretation & multimodal:
      - Taxonomy (Schaeffer & Schafer): guide/taxonomy.md
      - Visual features (multimodal): guide/vision.md
  - Corpus & workflow:
      - Corpus catalog: guide/catalog.md
      - Cross-session comparison: guide/compare.md
      - Longitudinal analysis: guide/longitudinal.md
      - Always-on capture: guide/capture.md
      - Deposit export: guide/deposit.md
  - API reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            members_order: source

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
